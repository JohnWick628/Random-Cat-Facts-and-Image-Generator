<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon-cat-face-32.png" type="image/x-icon">
    <title>Random Cat Facts & Image Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="marie-the-cat-seeklogo.png" alt="cat">
                <ul>
                    <li><h2>Random Cat Facts & Images</h2></li>
                    <li><p>Click The button to get a random cat fact and a cute pictute🥜</p></li>
                </ul>
            </div>
            <div class="nav-icon effect">
                <i class="fa-solid fa-paw"></i>
            </div>
        </nav>
    </header>

    <!-- Main Section -->
     <main>
        <div class="card">
            <div class="card-text card-text-1">
                <div class="card-icon card-icon-1">
                    <i class="fa-regular fa-message"></i>
                </div>
                <h4>Random Cat Facts</h4>
            </div>
            <div class="card-container card-container-1" id="random-cat-facts">Cats have over 20 muscles that control their ears.</div>
        </div>
        <div class="card">
            <div class="card-text card-text-2">
                <div class="card-icon card-icon-2">
                    <i class="fa-regular fa-image"></i>
                </div>
                <h4>Random Cat Image</h4>
            </div>
            <div class="card-container"><img src="random-cat-pic.jpg" alt="cat" id="random-cat-image"></div>
        </div>
     </main>

     <!-- Footer Section -->
      <footer>
        <div class="footer-icon effect footer-icon-1">
            <i class="fa-solid fa-paw"></i>
        </div>
        <button class="getFactBtn">
            <i class="fa-solid fa-rotate"></i>
            Get New Fact & Image
        </button>
        <div class="footer-icon effect footer-icon-2">
            <i class="fa-solid fa-paw"></i>
        </div>
      </footer>
      <div class="copyright">
        Made with 💗 by MAS The Tech Learner for all cat Lovers!
      </div>


    <script src="script.js"></script>
</body>
</html>
